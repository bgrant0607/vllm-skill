apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: vllm-router-servicemonitor
  namespace: confighubplaceholder
  labels:
    app.kubernetes.io/name: router
    app.kubernetes.io/instance: vllm
    app.kubernetes.io/component: router
    app.kubernetes.io/part-of: vllm-stack
spec:
  endpoints:
    - port: router-sport
      honorLabels: false
      interval: 30s
      scrapeTimeout: 25s
  selector:
    matchLabels:
      app.kubernetes.io/component: router
      app.kubernetes.io/instance: vllm
      app.kubernetes.io/name: router
      app.kubernetes.io/part-of: vllm-stack
