apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-deployment-router
  namespace: confighubplaceholder
  labels:
    app.kubernetes.io/name: router
    app.kubernetes.io/instance: vllm
    app.kubernetes.io/component: router
    app.kubernetes.io/part-of: vllm-stack
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: router
      app.kubernetes.io/instance: vllm
      app.kubernetes.io/component: router
      app.kubernetes.io/part-of: vllm-stack
  template:
    metadata:
      labels:
        app.kubernetes.io/name: router
        app.kubernetes.io/instance: vllm
        app.kubernetes.io/component: router
        app.kubernetes.io/part-of: vllm-stack
    spec:
      serviceAccountName: vllm-router-service-account
      containers:
        - name: router-container
          image: lmcache/lmstack-router:latest
          imagePullPolicy: Always
          env:
            - name: PYTHONHASHSEED
              value: "123"
          args:
            - "--host=0.0.0.0"
            - "--port=8000"
            - "--service-discovery=k8s"
            - "--k8s-namespace=confighubplaceholder"
            - "--k8s-service-discovery-type=pod-ip"
            - "--k8s-label-selector=environment=production"
            - "--routing-logic=roundrobin"
            - "--engine-stats-interval=15"
            - "--request-stats-window=60"
          resources:
            requests:
              cpu: 400m
              memory: 1000Mi
            limits:
              memory: 1000Mi
          ports:
            - name: router-cport
              containerPort: 8000
            - name: lmcache-port
              containerPort: 9000
          startupProbe:
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 3
            httpGet:
              path: /health
              port: 8000
          livenessProbe:
            initialDelaySeconds: 30
            periodSeconds: 5
            failureThreshold: 3
            httpGet:
              path: /health
              port: 8000
          readinessProbe:
            initialDelaySeconds: 30
            periodSeconds: 5
            failureThreshold: 3
            httpGet:
              path: /health
              port: 8000
